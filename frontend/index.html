<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>User Manager</title>
    <style> /* static/styles.css */
    /* Professional dark theme for index.html - User Manager */

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #111827, #1f2937, #0f172a);
        color: #f9fafb;
        padding: 40px 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 38px;
        letter-spacing: 1px;
        color: #ffffff;
    }

    .card {
        max-width: 900px;
        margin: 0 auto 30px auto;
        padding: 24px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        backdrop-filter: blur(12px);
    }

    input {
        width: 100%;
        padding: 13px 15px;
        border: 1px solid #374151;
        border-radius: 12px;
        outline: none;
        background: #111827;
        color: #f9fafb;
        font-size: 15px;
        transition: 0.25s ease;
    }

    input::placeholder {
        color: #9ca3af;
    }

    input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }

    button {
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        cursor: pointer;
        background: linear-gradient(135deg, #2563eb, #06b6d4);
        color: #ffffff;
        font-weight: bold;
        font-size: 15px;
        transition: 0.25s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(6, 182, 212, 0.35);
    }

    button:active {
        transform: scale(0.98);
    }

    table {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 18px;
        background: rgba(17, 24, 39, 0.95);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    thead {
        background: linear-gradient(135deg, #2563eb, #0891b2);
    }

    th,
    td {
        padding: 16px;
        text-align: left;
        border-bottom: 1px solid #374151;
    }

    th {
        color: #ffffff;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }

    td {
        color: #e5e7eb;
        font-size: 15px;
    }

    tbody tr {
        transition: 0.25s ease;
    }

    tbody tr:hover {
        background: rgba(56, 189, 248, 0.08);
    }

    tbody tr:last-child td {
        border-bottom: none;
    }

    td button {
        margin-right: 8px;
        padding: 9px 12px;
        font-size: 13px;
    }

    td button:nth-child(1) {
        background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    td button:nth-child(2) {
        background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    /* Edit row inputs inside the table */
    td input {
        padding: 10px 12px;
        font-size: 14px;
    }

    /* Optional toast/message style if your JavaScript creates one */
    .toast,
    .message,
    .alert {
        position: fixed;
        right: 24px;
        bottom: 24px;
        padding: 14px 18px;
        border-radius: 14px;
        background: #0f172a;
        color: #ffffff;
        border: 1px solid #38bdf8;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        z-index: 999;
    }

    /* Responsive design */
    @media (max-width: 768px) {
        body {
            padding: 25px 12px;
        }

        h1 {
            font-size: 30px;
        }

        .card {
            grid-template-columns: 1fr;
            padding: 18px;
        }

        table {
            display: block;
            overflow-x: auto;
            white-space: nowrap;
        }

        th,
        td {
            padding: 13px;
        }
    }
    </style>
</head>
