name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [dev, amir]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASS }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests

  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build image
        run: docker build -t amirbaddour/healthcheck ./backend

      - name: Push image
        run: docker push amirbaddour/healthcheck

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker network create healthnet || true

            docker stop postgres_db || true
            docker rm postgres_db || true

            docker run -d --name postgres_db --network healthnet \
              -e POSTGRES_USER=${{ secrets.DB_USER }} \
              -e POSTGRES_PASSWORD=${{ secrets.DB_PASS }} \
              -e POSTGRES_DB=${{ secrets.DB_NAME }} \
              postgres:15

            docker pull amirbaddour/healthcheck

            docker stop healthcheck-container || true
            docker rm healthcheck-container || true

            docker run -d --name healthcheck-container --network healthnet -p 80:8080 \
              -e DB_URL=jdbc:postgresql://postgres_db:5432/${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASS=${{ secrets.DB_PASS }} \
              amirbaddour/healthcheck